<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Creation Jewel Source</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-logo">JS</div>
    <h1>Jewel Source</h1>
    <p>Style Creation Portal</p>
  </div>
  <div class="card">
    <div class="card-title">New Style Entry</div>
    <div class="section-label">Classification</div>
 
    <div class="field-group">
      <div class="field" id="field-stoneType">
        <label>Stone Type <span class="req">*</span></label>
        <select id="stoneType" onchange="onStoneTypeChange()">
          <option value="">Loading...</option>
        </select>
        <span class="error-msg">Please select a stone type</span>
      </div>
      <div class="field" id="field-category">
        <label>Category <span class="req">*</span></label>
        <select id="category" onchange="onCategoryChange()" disabled>
          <option value="">Select category...</option>
        </select>
        <span class="error-msg">Please select a category</span>
      </div>
    </div>
 
    <div class="field-group full">
      <div class="field">
        <label>UID (Auto-assigned)</label>
        <div class="uid-wrapper">
          <input type="text" id="uid" placeholder="Select stone type & category first..." readonly>
          <div class="uid-loader" id="uidLoader"></div>
          <div class="uid-lock" id="uidLock">🔒</div>
        </div>
        <div class="uid-note" id="uidNote"></div>
      </div>
    </div>
 
    <div class="divider"></div>
    <div class="section-label">Style Details</div>
 
    <div class="field-group">
      <div class="field" id="field-ctw">
        <label>CTW</label>
        <input type="number" id="ctw" placeholder="e.g. 0.50" step="0.01" min="0" oninput="updateStylePreview()">
      </div>
      <div class="field" id="field-colorstone">
        <label>Colorstone</label>
        <select id="colorstone" onchange="updateStylePreview()">
          <option value="">None</option>
        </select>
      </div>
    </div>
 
    <div class="field-group">
      <div class="field" id="field-metal">
        <label>Metal <span class="req">*</span></label>
        <select id="metal" onchange="updateStylePreview()">
          <option value="">Loading...</option>
        </select>
        <span class="error-msg">Please select a metal</span>
      </div>
      <div class="field" id="field-size">
        <label>Size <span class="req">*</span></label>
        <select id="size" onchange="updateStylePreview()">
          <option value="">Loading...</option>
        </select>
        <span class="error-msg">Please select a size</span>
      </div>
    </div>

    <div class="field" id="field-vendor-name">
  <label>Vendor Name</label>
  <input type="text" id="vendorName" placeholder="e.g. Omnia">
</div>

<div class="field" id="field-vendor-style">
  <label>Vendor Style#</label>
  <input type="text" id="vendorStyle" placeholder="e.g. OR6094400">
</div>

 
    <!-- Live Style # Preview -->
    <div class="style-preview pending" id="stylePreview">
      <div>
        <div class="style-preview-label">Generated Style #</div>
        <div class="style-preview-value" id="stylePreviewValue">—</div>
      </div>
      <div class="style-preview-badge" id="stylePreviewBadge">Pending</div>
    </div>
 
    <button class="submit-btn" id="submitBtn" onclick="submitForm()" disabled>
      Create Style
    </button>
  </div>
</div>
 
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p id="loadingMsg">Loading...</p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_KEY  = 'nc_pat_F9HQ6IvRDC0ySe0VLbF4BrI6Rdf1FManDu7RBnuU';
const BASE_URL = 'https://db.jsi.studio';

// Style Creation
const SC_BASE  = 'p5pig2ru4284ft2';
const SC_TABLE = 'm2ei89b5zqhr1cu';

// Linked table IDs (from the valid record's fk_related_model_id)
const TBL_STONE_TYPE  = 'mu6pzbj9k7z1ehs';
const TBL_CATEGORY    = 'm4cym8kn8kxynzs';
const TBL_COLORSTONE  = 'm6npmo8juryjkz6';
const TBL_METAL       = 'mxbwq6yta71dia1';
const TBL_SIZE        = 'mudzx7zipojwm7o';

// UID Base
const UID_BASE        = 'pbe18uecvc3ly66';
const UID_TABLE_RING  = 'm5wdqbrjc2yqr2f';
const UID_TABLE_EARRING = 'm4jbmsd175z1eom';
const UID_TABLE_PENDANT = 'mhcwzcfekl0lhhh';

// Map category name to UID table ID (add more as you upload them)
const UID_TABLES = {
  'Ring': UID_TABLE_RING,
  'Earrings': UID_TABLE_EARRING,
  'Pendant': UID_TABLE_PENDANT
  // 'Pendant': 'table_id_here', add others later
};

// Map stone type name to UID prefix config
const UID_CONFIG = {
  'Lab Diamond': {
    'Ring':     { prefix: 'A', padLen: 0 },
    'Pendant':  { prefix: 'A', padLen: 0 },
    'Earring':  { prefix: 'A', padLen: 0 },
    'Necklace': { prefix: 'A', padLen: 0 },
    'Bracelet': { prefix: '',  padLen: 4 },
    'Bangle':   { prefix: 'AABG', padLen: 3 },
    'Cufflink': { prefix: 'AAC', padLen: 3 },
    'Brooch':   { prefix: '',  padLen: 4 },
  }
};
const CATEGORY_MAP = {
  'Ring': 'RING', 'Earrings': 'EARRINGS', 'Earring': 'EARRINGS',
  'Pendant': 'PENDANT', 'Necklace': 'NECKLACE', 'Bracelet': 'BRACELET',
  'Bangle': 'BANGLE', 'Cufflink': 'CUFFLINK', 'Brooch': 'BROOCH', 'Set': 'SET',
};

let allCategories = [];
let currentUID = '';
let currentUIDNumber = null;
let allSizes = [];

async function fetchAll(baseId, tableId, fields = '', where = '') {
  let page = 1, limit = 1000, all = [];
  while (true) {
    let url = `${BASE_URL}/api/v1/db/data/noco/${baseId}/${tableId}?limit=${limit}&offset=${(page-1)*limit}`;
    if (fields) url += `&fields=${encodeURIComponent(fields)}`;
    if (where)  url += `&where=${encodeURIComponent(where)}`;
    const res = await fetch(url, { headers: { 'xc-token': API_KEY } });
    const data = await res.json();
    const list = data.list || [];
    all = all.concat(list);
    if (all.length >= (data.pageInfo?.totalRows || all.length)) break;
    page++;
  }
  return all;
}

async function init() {
  showLoading('Loading dropdowns...');
  try {
    const [stoneTypes, categories, colorstones, metals, sizes] = await Promise.all([
      fetchAll(SC_BASE, TBL_STONE_TYPE),
      fetchAll(SC_BASE, TBL_CATEGORY),
      fetchAll(SC_BASE, TBL_COLORSTONE),
      fetchAll(SC_BASE, TBL_METAL),
      fetchAll(SC_BASE, TBL_SIZE),
    ]);
 
    allCategories = categories;
    allSizes = sizes;
 
    populateSelect('stoneType', stoneTypes, r => r['Stone Type'], r => r['Style # Code'], false);
    populateSelect('colorstone', colorstones, r => r['Colorstone'], r => r['Style # Code'], true);
    populateSelect('metal', metals, r => r['Metal'], r => r['Style # Code'], false);
    populateSelect('size',sizes, r => r['Size Selection'] || r['Size'], r => r['Style # Code'], false);
 
  } catch(e) {
    showToast('Failed to load dropdowns: ' + e.message, 'error');
    console.error(e);
  } finally {
    hideLoading();
  }
}

function populateSelect(id, records, labelFn, codeFn, includeNone) {
  const sel = document.getElementById(id);
  sel.innerHTML = '';
  const blank = document.createElement('option');
  blank.value = ''; blank.textContent = includeNone ? 'None' : 'Select...';
  sel.appendChild(blank);
  records.forEach(r => {
    const opt = document.createElement('option');
    opt.value        = r.Id;
    opt.textContent  = labelFn(r) || `ID ${r.Id}`;
    opt.dataset.name = labelFn(r) || '';
    opt.dataset.code = codeFn(r)  || '';
    sel.appendChild(opt);
  });
}

function onStoneTypeChange() {
  clearField('field-stoneType');
  clearUID();
  updateStylePreview();
  document.getElementById('submitBtn').disabled = true;

  const stSel = document.getElementById('stoneType');
  const stName = stSel.options[stSel.selectedIndex]?.dataset.name || '';
  const catSel = document.getElementById('category');
  catSel.innerHTML = '<option value="">Select category...</option>';
  catSel.disabled = !stName;

  const colSel = document.getElementById('colorstone');
  const gemStones = ['Natural Gemstone', 'Lab Gem'];
  if (gemStones.includes(stName)) {
    colSel.disabled = false;
    colSel.style.opacity = '1';
  } else {
    colSel.value    = '';
    colSel.disabled = true;
    colSel.style.opacity = '0.5';
  }


  // All categories are valid for all stone types — show all
  allCategories.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.Id;
    opt.textContent = r['Categories'] || r['Category'] || `ID ${r.Id}`;
    opt.dataset.name = r['Categories'] || r['Category'] || '';
    opt.dataset.code = r['Style # Code'] || '';
    catSel.appendChild(opt);
  });
}

function onCategoryChange() {
  clearField('field-category');
  clearUID();
  updateStylePreview();
  document.getElementById('submitBtn').disabled = true;

  const stSel  = document.getElementById('stoneType');
  const catSel = document.getElementById('category');
  const sizeSel = document.getElementById('size');
  const stName  = stSel.options[stSel.selectedIndex]?.dataset.name || '';
  const catName = catSel.options[catSel.selectedIndex]?.dataset.name || '';

  const noSizeCategories = ['Earrings', 'Earring', 'Pendant', 'Brooch', 'Cufflink', 'Set', 'Anklet'];
  const sizeCategories   = ['Ring', 'Bracelet', 'Necklace', 'Bangle'];

  sizeSel.innerHTML = '';

  if (noSizeCategories.includes(catName)) {
    const xOpt = allSizes.find(r => (r['Style # Code'] || '') === 'X');
    if (xOpt) {
      const opt = document.createElement('option');
      opt.value        = xOpt.Id;
      opt.textContent  = xOpt['Size Selection'] || xOpt['Size'] || 'X';
      opt.dataset.name = opt.textContent;
      opt.dataset.code = 'X';
      sizeSel.appendChild(opt);
      sizeSel.value    = xOpt.Id;
    }
    sizeSel.disabled      = true;
    sizeSel.style.opacity = '0.5';
  } else if (sizeCategories.includes(catName)) {
    const blank = document.createElement('option');
    blank.value = ''; blank.textContent = 'Select...';
    sizeSel.appendChild(blank);

    allSizes
      .filter(r => {
        const label = r['Size Selection'] || r['Size'] || '';
        const code  = r['Style # Code'] || '';
        return label.includes(catName) || code === 'X';
      })
      .forEach(r => {
        const opt = document.createElement('option');
        opt.value        = r.Id;
        opt.textContent  = r['Size Selection'] || r['Size'] || `ID ${r.Id}`;
        opt.dataset.name = opt.textContent;
        opt.dataset.code = r['Style # Code'] || '';
        sizeSel.appendChild(opt);
      });

    sizeSel.value         = '';
    sizeSel.disabled      = false;
    sizeSel.style.opacity = '1';
  } else {
    const blank = document.createElement('option');
    blank.value = ''; blank.textContent = 'Select...';
    sizeSel.appendChild(blank);
    allSizes.forEach(r => {
      const opt = document.createElement('option');
      opt.value        = r.Id;
      opt.textContent  = r['Size Selection'] || r['Size'] || `ID ${r.Id}`;
      opt.dataset.name = opt.textContent;
      opt.dataset.code = r['Style # Code'] || '';
      sizeSel.appendChild(opt);
    });
    sizeSel.value         = '';
    sizeSel.disabled      = false;
    sizeSel.style.opacity = '1';
  }

  if (!catName) return;
  fetchNextUID(stName, catName);
  updateStylePreview();
}

function clearUID() {
  currentUID = ''; currentUIDNumber = null;
  const uid = document.getElementById('uid');
  uid.value = '';
  uid.placeholder = 'Select stone type & category first...';
  document.getElementById('uidNote').textContent = '';
  document.getElementById('uidLock').style.display = 'none';
}

async function fetchNextUID(stName, catName) {
  const loader   = document.getElementById('uidLoader');
  const lock     = document.getElementById('uidLock');
  const uidInput = document.getElementById('uid');
  const uidNote  = document.getElementById('uidNote');
 
  loader.style.display = 'block';
  uidInput.value = 'Fetching...';
 
  try {
    const uidTableId = UID_TABLES[catName];
 
    if (!uidTableId) {
      uidInput.value       = '';
      uidInput.placeholder = `UID table for ${catName} not uploaded yet`;
      uidNote.textContent  = `Upload the ${catName} Excel to UID Base first`;
      loader.style.display = 'none';
      updateStylePreview();
      return;
    }
 
    const catFilter = CATEGORY_MAP[catName] || catName.toUpperCase();
    const records   = await fetchAll(UID_BASE, uidTableId, 'JSI Style#', `(Category,eq,${catFilter})`);
 
    const cfg    = UID_CONFIG[stName]?.[catName] || { prefix: '', padLen: 4 };
    const prefix = cfg.prefix;
    let maxNum   = 0;
 
    records.forEach(r => {
      const jsi = String(r['JSI Style#'] || '').trim().toUpperCase();
      let num = 0;
      if (prefix && jsi.startsWith(prefix)) {
        num = parseInt(jsi.slice(prefix.length)) || 0;
      } else {
        const m = jsi.match(/(\d+)$/);
        if (m) num = parseInt(m[1]);
      }
      if (num > maxNum) maxNum = num;
    });
 
    const nextNum    = maxNum + 1;
    currentUIDNumber = nextNum;
 
    if (prefix === 'A') {
      currentUID = `A${nextNum}`;
    } else if (prefix) {
      currentUID = `${prefix}${String(nextNum).padStart(cfg.padLen, '0')}`;
    } else {
      currentUID = String(nextNum).padStart(cfg.padLen, '0');
    }
 
    uidInput.value      = currentUID;
    uidNote.textContent = `✓ Auto-assigned — ${records.length} existing ${catName} styles found`;
    lock.style.display  = 'block';
 
    // FIX: update preview after UID is ready
    updateStylePreview();
 
  } catch(e) {
    uidInput.value       = '';
    uidInput.placeholder = 'Error fetching UID';
    uidNote.textContent  = e.message;
    console.error(e);
  } finally {
    loader.style.display = 'none';
  }
}

function clearField(id) { document.getElementById(id)?.classList.remove('has-error'); }
function setError(id)   { document.getElementById(id)?.classList.add('has-error'); }

function validate() {
  let ok = true;
  if (!document.getElementById('stoneType').value) { setError('field-stoneType'); ok = false; }
  if (!document.getElementById('category').value)  { setError('field-category');  ok = false; }
  if (!document.getElementById('metal').value)     { setError('field-metal');      ok = false; }
  if (!document.getElementById('size').value)      { setError('field-size');       ok = false; }
  const style = buildStyleNumber();
  if (!style || style.length !== 13) {
    showToast(`Style # must be exactly 13 characters. Currently: ${style ? style.length : 0}`, 'error');
    ok = false;
  }
  return ok;
}

async function submitForm() {
  if (!validate()) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  showLoading('Saving style to NocoDB...');

  // Build payload with linked record IDs ({"Id": X} format)
  const stoneTypeId   = parseInt(document.getElementById('stoneType').value);
  const categoryId    = parseInt(document.getElementById('category').value);
  const metalId       = parseInt(document.getElementById('metal').value);
  const sizeId        = parseInt(document.getElementById('size').value);
  const colId         = document.getElementById('colorstone').value;
  const ctw           = document.getElementById('ctw').value;
  const vendorName  = document.getElementById('vendorName').value.trim();
  const vendorStyle = document.getElementById('vendorStyle').value.trim();
  const styleNum    = buildStyleNumber();

  const catSel  = document.getElementById('category');
  const catName = catSel.options[catSel.selectedIndex]?.dataset.name || '';

  const payload = {
    'Stone Type': { Id: stoneTypeId },
    'Category':   { Id: categoryId },
    'Metal':      { Id: metalId },
    'Size':       { Id: sizeId },
    'UID':        String(currentUIDNumber),
  };

  if (ctw) payload['CTW'] = parseFloat(ctw);
  if (colId) payload['Colorstone'] = { Id: parseInt(colId) };

  try {
    const res = await fetch(
      `${BASE_URL}/api/v1/db/data/noco/${SC_BASE}/${SC_TABLE}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'xc-token': API_KEY },
        body: JSON.stringify(payload),
      }
    );

    const result = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(result));

    const uidTableId = UID_TABLES[catName];
    if (uidTableId && styleNum) {
  const existing = await fetchAll(
    UID_BASE, uidTableId, 'Id,JSI Style#',
    `(JSI Style#,eq,${currentUIDNumber})`
  );

  if (existing.length > 0) {
    const rowId = existing[0].Id;
    await fetch(
      `${BASE_URL}/api/v1/db/data/noco/${UID_BASE}/${uidTableId}/${rowId}`,
      {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'xc-token': API_KEY },
        body: JSON.stringify({
          'Vendor':        vendorName  || '',
          'Vendor Style#': vendorStyle || '',
          'Category':      catName.toUpperCase(),
          'Our Style#':    styleNum,
        }),
      }
    );
  } else {
    await fetch(
      `${BASE_URL}/api/v1/db/data/noco/${UID_BASE}/${uidTableId}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'xc-token': API_KEY },
        body: JSON.stringify({
          'Vendor':        vendorName  || '',
          'Vendor Style#': vendorStyle || '',
          'Category':      catName.toUpperCase(),
          'JSI Style#':    String(currentUIDNumber),
          'Our Style#':    styleNum,
        }),
      }
    );
  }
}

    showToast(`✓ Style created! UID: ${currentUID}`, 'success');
    resetForm();

  } catch(e) {
    showToast('Failed to save: ' + e.message, 'error');
    console.error(e);
  } finally {
    hideLoading();
    btn.disabled = false;
    btn.textContent = 'Create Style';
  }
}

function resetForm() {
  ['stoneType','category','ctw','colorstone','metal','size'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'SELECT') { el.value = ''; if (id === 'category') el.disabled = true; }
    else el.value = '';
  });
  document.getElementById('vendorName').value  = '';
  document.getElementById('vendorStyle').value = '';
  clearUID();
  document.querySelectorAll('.field').forEach(f => f.classList.remove('has-error'));
  document.getElementById('submitBtn').disabled = true;
  updateStylePreview();
}

function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 5000);
}

function buildStyleNumber() {
  const stSel    = document.getElementById('stoneType');
  const catSel   = document.getElementById('category');
  const metalSel = document.getElementById('metal');
  const colSel   = document.getElementById('colorstone');
  const sizeSel  = document.getElementById('size');
  const ctw      = document.getElementById('ctw').value;
 
  const stCode  = stSel.options[stSel.selectedIndex]?.dataset.code      || '';
  const catCode = catSel.options[catSel.selectedIndex]?.dataset.code     || '';
  const mCode   = metalSel.options[metalSel.selectedIndex]?.dataset.code || '';
  const sCode   = sizeSel.options[sizeSel.selectedIndex]?.dataset.code   || '';
 
  let midCode = '';
  if (ctw && parseFloat(ctw) > 0) {
    midCode = String(Math.round(parseFloat(ctw) * 100)).padStart(4, '0');
  } else if (colSel.value) {
    midCode = colSel.options[colSel.selectedIndex]?.dataset.code || '';
  }
 
  // UID always 4 digits
  const uidPart = currentUIDNumber ? String(currentUIDNumber).padStart(4, '0') : '';
 
  if (!stCode || !catCode || !midCode || !mCode || !uidPart || !sCode) return null;
 
  return stCode + catCode + midCode + mCode + uidPart + sCode;
}
 
function updateStylePreview() {
  const preview = document.getElementById('stylePreview');
  const val     = document.getElementById('stylePreviewValue');
  const badge   = document.getElementById('stylePreviewBadge');
  const btn     = document.getElementById('submitBtn');
 
  const style = buildStyleNumber();
 
  if (!style) {
    preview.className = 'style-preview pending';
    val.textContent   = '—';
    badge.textContent = 'Pending';
    btn.disabled      = true;
    return;
  }
 
  val.textContent = style;
 
  if (style.length === 13) {
    preview.className = 'style-preview';
    badge.textContent = `✓ ${style.length} chars`;
    btn.disabled      = false;
  } else {
    preview.className = 'style-preview invalid';
    badge.textContent = `✗ ${style.length}/13 chars`;
    btn.disabled      = true;
  }
}

init();
</script>
</body>
</html>
